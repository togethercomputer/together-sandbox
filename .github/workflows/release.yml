name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  python-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: together-sandbox-python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install workspace dependencies
        run: npm ci
        working-directory: ${{ github.workspace }}

      - name: Install openapi-python-client
        run: pip install openapi-python-client

      - name: Generate SDKs
        run: bash generate.sh
        working-directory: ${{ github.workspace }}

      - name: Install dependencies
        run: pip install .[dev]

      - name: Run tests
        run: pytest tests/ -v

  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file:   release-please-config.json
          manifest-file: release-please-manifest.json

  build-and-upload:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace dependencies
        run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install openapi-python-client
        run: pip install openapi-python-client

      - name: Generate SDKs
        run: bash generate.sh

      - name: Build TypeScript SDK
        run: npm run build
        working-directory: together-sandbox-typescript

      - name: Pack TypeScript SDK
        run: |
          npm pack --workspace=together-sandbox-typescript
          mv together-sandbox-sdk-*.tgz together-sandbox-sdk.tgz

      - name: Build CLI binaries
        working-directory: together-sandbox-cli
        run: |
          mkdir -p dist
          bun build --compile --minify src/main.ts --target=bun-darwin-arm64  --outfile dist/together-sandbox-darwin-arm64
          bun build --compile --minify src/main.ts --target=bun-darwin-x64    --outfile dist/together-sandbox-darwin-x64
          bun build --compile --minify src/main.ts --target=bun-linux-x64     --outfile dist/together-sandbox-linux-x64
          bun build --compile --minify src/main.ts --target=bun-linux-arm64   --outfile dist/together-sandbox-linux-arm64
          bun build --compile --minify src/main.ts --target=bun-windows-x64   --outfile dist/together-sandbox-windows-x64.exe

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            together-sandbox-sdk.tgz
            together-sandbox-cli/dist/together-sandbox-darwin-arm64
            together-sandbox-cli/dist/together-sandbox-darwin-x64
            together-sandbox-cli/dist/together-sandbox-linux-x64
            together-sandbox-cli/dist/together-sandbox-linux-arm64
            together-sandbox-cli/dist/together-sandbox-windows-x64.exe
