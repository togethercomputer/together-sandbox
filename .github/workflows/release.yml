name: Release CLI and SDK

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and release binaries and SDK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace dependencies
        run: npm ci

      - name: Build TypeScript SDK
        run: npm run build
        working-directory: together-sandbox-typescript

      - name: Pack TypeScript SDK
        run: |
          npm pack --workspace=together-sandbox-typescript
          mv together-sandbox-sdk-*.tgz together-sandbox-sdk.tgz

      - name: Build binaries
        working-directory: together-sandbox-cli
        run: |
          mkdir -p dist
          bun build --compile --minify src/main.tsx --target=bun-darwin-arm64   --outfile dist/together-sandbox-darwin-arm64
          bun build --compile --minify src/main.tsx --target=bun-darwin-x64     --outfile dist/together-sandbox-darwin-x64
          bun build --compile --minify src/main.tsx --target=bun-linux-x64      --outfile dist/together-sandbox-linux-x64
          bun build --compile --minify src/main.tsx --target=bun-linux-arm64    --outfile dist/together-sandbox-linux-arm64
          bun build --compile --minify src/main.tsx --target=bun-windows-x64    --outfile dist/together-sandbox-windows-x64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            together-sandbox-sdk.tgz
            together-sandbox-cli/dist/together-sandbox-darwin-arm64
            together-sandbox-cli/dist/together-sandbox-darwin-x64
            together-sandbox-cli/dist/together-sandbox-linux-x64
            together-sandbox-cli/dist/together-sandbox-linux-arm64
            together-sandbox-cli/dist/together-sandbox-windows-x64.exe
