name: Lint PR

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions:
  pull-requests: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Lint | Lint PR Title
        uses: amannn/action-semantic-pull-request@5a258b8b7d2d971bd67556cce928dc8a5d8b3a4c # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
