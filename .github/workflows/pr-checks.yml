name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  validate-release-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate release-please configuration
        run: |
          node -e "
            const fs = require('fs');

            // 1. Validate JSON syntax
            const config = JSON.parse(fs.readFileSync('release-please-config.json', 'utf8'));
            console.log('✓ release-please-config.json is valid JSON');

            const manifest = JSON.parse(fs.readFileSync('release-please-manifest.json', 'utf8'));
            console.log('✓ release-please-manifest.json is valid JSON');

            // 2. Validate config structure
            const errors = [];
            if (!config.packages || typeof config.packages !== 'object') {
              errors.push('release-please-config.json: missing or invalid \"packages\" field');
            }

            // 3. Validate manifest has entries matching config packages
            for (const pkg of Object.keys(config.packages || {})) {
              if (!(pkg in manifest)) {
                errors.push('release-please-manifest.json: missing version entry for package \"' + pkg + '\"');
              }
            }

            // 4. Validate all extra-files referenced in config actually exist
            for (const [pkg, pkgConfig] of Object.entries(config.packages || {})) {
              for (const ef of pkgConfig['extra-files'] || []) {
                const filePath = ef.path;
                if (filePath && !fs.existsSync(filePath)) {
                  errors.push('extra-file not found: ' + filePath);
                }
              }
            }

            // 5. Validate root package.json has a version field (required by node release-type)
            const rootPkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            if (!rootPkg.version) {
              errors.push('package.json: missing \"version\" field (required by release-please node release-type)');
            }

            if (errors.length > 0) {
              console.error('\\n✗ Validation failed:');
              errors.forEach(e => console.error('  - ' + e));
              process.exit(1);
            }

            console.log('✓ Config structure is valid');
            console.log('✓ Manifest versions match config packages');
            console.log('✓ All extra-files exist');
            console.log('✓ Root package.json has version field');
            console.log('\\nAll release-please configuration checks passed.');
          "

  build-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace dependencies
        run: npm ci

      - name: Build TypeScript SDK
        run: npm run build
        working-directory: together-sandbox-typescript

      - name: Pack TypeScript SDK
        run: |
          npm pack --workspace=together-sandbox-typescript
          mv together-sandbox-sdk-*.tgz together-sandbox-sdk.tgz

      - name: Build CLI binaries
        working-directory: together-sandbox-cli
        run: |
          mkdir -p dist
          bun build --compile --minify src/main.ts --target=bun-darwin-arm64  --outfile dist/together-sandbox-darwin-arm64
          bun build --compile --minify src/main.ts --target=bun-darwin-x64    --outfile dist/together-sandbox-darwin-x64
          bun build --compile --minify src/main.ts --target=bun-linux-x64     --outfile dist/together-sandbox-linux-x64
          bun build --compile --minify src/main.ts --target=bun-linux-arm64   --outfile dist/together-sandbox-linux-arm64
          bun build --compile --minify src/main.ts --target=bun-windows-x64   --outfile dist/together-sandbox-windows-x64.exe

      - name: Verify all artifacts exist
        run: |
          ls -lh together-sandbox-sdk.tgz
          ls -lh together-sandbox-cli/dist/
