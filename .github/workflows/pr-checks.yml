name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  release-please-dry-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dry-run release-please
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx --yes release-please release-pr \
            --dry-run \
            --token "$GITHUB_TOKEN" \
            --repo-url "$GITHUB_REPOSITORY" \
            --config-file release-please-config.json \
            --manifest-file release-please-manifest.json

  build-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace dependencies
        run: npm ci

      - name: Build TypeScript SDK
        run: npm run build
        working-directory: together-sandbox-typescript

      - name: Pack TypeScript SDK
        run: |
          npm pack --workspace=together-sandbox-typescript
          mv together-sandbox-sdk-*.tgz together-sandbox-sdk.tgz

      - name: Build CLI binaries
        working-directory: together-sandbox-cli
        run: |
          mkdir -p dist
          bun build --compile --minify src/main.tsx --target=bun-darwin-arm64  --outfile dist/together-sandbox-darwin-arm64
          bun build --compile --minify src/main.tsx --target=bun-darwin-x64    --outfile dist/together-sandbox-darwin-x64
          bun build --compile --minify src/main.tsx --target=bun-linux-x64     --outfile dist/together-sandbox-linux-x64
          bun build --compile --minify src/main.tsx --target=bun-linux-arm64   --outfile dist/together-sandbox-linux-arm64
          bun build --compile --minify src/main.tsx --target=bun-windows-x64   --outfile dist/together-sandbox-windows-x64.exe

      - name: Verify all artifacts exist
        run: |
          ls -lh together-sandbox-sdk.tgz
          ls -lh together-sandbox-cli/dist/
