[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "together-sandbox"
version = "1.12.0"
description = "Together Sandbox Python SDK"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.20.0",
    "httpx-sse>=0.4.0",
    "cattrs>=23.0.0",
    "attrs>=23.0.0",
    "python-dateutil>=2.8.0",
    "pathspec>=0.11.0",
]
license = { text = "MIT" }

[project.optional-dependencies]
dev = [
    "openapi-python-client>=0.28.0",
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-timeout>=2.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["together_sandbox"]

# Bundle the docs generated by `bash generate.sh` (from the repo root) into
# the wheel so they ship inside site-packages/together_sandbox/ for agents and
# tools that introspect installed packages.
[tool.hatch.build.targets.wheel.force-include]
"docs" = "together_sandbox/docs"
"LLMS.md" = "together_sandbox/LLMS.md"

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = ["e2e: end-to-end tests that require TOGETHER_API_KEY"]
norecursedirs = ["e2e"]
